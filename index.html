<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>2048</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
    <div class="app">
      <header class="header">
        <div class="title-block">
          <h1>2048</h1>
          <p class="subtitle">Join tiles, reach 2048!</p>
        </div>
        <div class="scores">
          <div class="score-box">
            <span class="score-label">Score</span>
            <span id="score" class="score-value">0</span>
          </div>
          <div class="score-box">
            <span class="score-label">Best</span>
            <span id="best-score" class="score-value">0</span>
          </div>
        </div>
      </header>

      <div class="controls">
        <label class="name-field" for="player-name">
          <span class="name-label">Name</span>
          <input
            id="player-name"
            type="text"
            placeholder="Your name"
            maxlength="16"
            autocomplete="nickname"
          />
        </label>
        <button id="new-game" type="button" class="btn">New Game</button>
      </div>
      <p id="current-player" class="current-player" hidden></p>

      <div class="board-wrap">
        <div id="grid-background" class="grid-background"></div>
        <div id="tile-container" class="tile-container"></div>
        <div id="overlay" class="overlay hidden" aria-hidden="true">
          <div class="overlay-card">
            <p id="overlay-message" class="overlay-message"></p>
            <button id="try-again" type="button" class="btn">Try Again</button>
          </div>
        </div>
      </div>

      <p class="hint">
        <span class="hint-desktop"
          >Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or swipe to move
          tiles.</span
        >
        <span class="hint-mobile">Swipe on the board to move tiles.</span>
      </p>

      <button type="button" id="view-scores-btn" class="btn view-scores-btn">
        Scores &amp; leaderboards
      </button>
    </div>

    <aside
      id="scores-panel"
      class="milestone-board scores-panel"
      aria-label="Milestone times and leaderboards"
      aria-hidden="true"
    >
      <div class="scores-panel-header">
        <h2 class="scores-panel-heading">Scores &amp; leaderboards</h2>
        <button type="button" id="close-scores-btn" class="btn btn-compact">
          Back to game
        </button>
      </div>

      <h2 class="milestone-title">Milestones</h2>
      <p class="milestone-subtitle">Time to first tile</p>
      <ul class="milestone-list" id="milestone-list">
        <li class="milestone-row" data-value="128">
          <span class="milestone-label tile-128">128</span>
          <span class="milestone-time" data-milestone="128">—</span>
        </li>
        <li class="milestone-row" data-value="256">
          <span class="milestone-label tile-256">256</span>
          <span class="milestone-time" data-milestone="256">—</span>
        </li>
        <li class="milestone-row" data-value="512">
          <span class="milestone-label tile-512">512</span>
          <span class="milestone-time" data-milestone="512">—</span>
        </li>
        <li class="milestone-row" data-value="1024">
          <span class="milestone-label tile-1024">1024</span>
          <span class="milestone-time" data-milestone="1024">—</span>
        </li>
        <li class="milestone-row" data-value="2048">
          <span class="milestone-label tile-2048">2048</span>
          <span class="milestone-time" data-milestone="2048">—</span>
        </li>
      </ul>

      <section class="leaderboard" aria-label="Top performers to 512">
        <h2 class="leaderboard-title">Top 3</h2>
        <p class="leaderboard-subtitle">Fastest to 512</p>
        <ol id="leaderboard-512-list" class="leaderboard-list"></ol>
      </section>

      <section class="leaderboard" aria-label="Top performers to 2048">
        <h2 class="leaderboard-title">Top 3</h2>
        <p class="leaderboard-subtitle">Fastest to 2048</p>
        <ol id="leaderboard-list" class="leaderboard-list"></ol>
      </section>
    </aside>
    </div>

    <script src="game.js"></script>
  </body>
</html>
